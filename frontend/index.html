<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory Expiration Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <div class="sidebar">
    <h2>Inventory</h2>
    <a href="#" class="active">Dashboard</a>
    <a href="#">Forecast</a>
    <a href="#">Expiry Alerts</a>
    <a href="#">Settings</a>
  </div>

  <div class="main">

    <div class="summary-cards">
      <div class="summary-card safe">
        <h4>Safe Items</h4>
        <p id="safeCount">0</p>
      </div>
      <div class="summary-card expiring">
        <h4>Expiring Soon</h4>
        <p id="expiringCount">0</p>
      </div>
      <div class="summary-card critical">
        <h4>Critical (7 days)</h4>
        <p id="criticalCount">0</p>
      </div>
      <div class="summary-card expired">
        <h4>Expired</h4>
        <p id="expiredCount">0</p>
      </div>
    </div>

    <div class="card">
      <h3>Add New Item</h3>
      <form id="addItemForm" onsubmit="addItem(event)">
        <div class="form-row">
          <input type="text" id="itemName" placeholder="Item Name" required>
          <input type="number" id="itemStock" placeholder="Stock Quantity" min="0" required>
          <input type="date" id="itemExpiry" required>
          <button type="submit" class="btn-primary">Add Item</button>
        </div>
      </form>
    </div>

    <div class="card">
      <h3>Inventory Table</h3>
      <div class="table-controls">
        <input type="text" id="searchInput" placeholder="Search items..." onkeyup="searchItems()">
        <select id="filterStatus" onchange="filterItems()">
          <option value="all">All Items</option>
          <option value="safe">Safe</option>
          <option value="expiring">Expiring Soon</option>
          <option value="critical">Critical</option>
          <option value="expired">Expired</option>
        </select>
      </div>

      <table id="inventoryTable">
        <thead>
          <tr class="header">
            <th>Item</th>
            <th>Stock</th>
            <th>Expiry Date</th>
            <th>Days Left</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="6" style="text-align:center; padding:30px;">Loading...</td></tr>
        </tbody>
      </table>
    </div>

  </div>

</div>

<script>
const API_URL = 'http://localhost:3000/api/items';
let inventory = [];

function getDaysUntilExpiry(expiryDate) {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const expiry = new Date(expiryDate);
  const diffTime = expiry - today;
  return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
}

function getExpiryStatus(daysLeft) {
  if (daysLeft < 0) return { text: "Expired", class: "expired", color: "#EB5757" };
  if (daysLeft <= 7) return { text: "Critical", class: "critical", color: "#EB5757" };
  if (daysLeft <= 30) return { text: "Expiring Soon", class: "expiring", color: "#F2C94C" };
  return { text: "Safe", class: "safe", color: "#27AE60" };
}

function getStockStatus(stock) {
  if (stock === 0) return { text: "Out of Stock", color: "#EB5757" };
  if (stock < 20) return { text: "Low Stock", color: "#F2C94C" };
  return { text: "In Stock", color: "#27AE60" };
}

async function loadItems() {
  try {
    const response = await fetch(API_URL);
    inventory = await response.json();
    renderTable();
  } catch (error) {
    document.getElementById('tableBody').innerHTML = 
      '<tr><td colspan="6" style="text-align:center; color:red; padding:30px;">Failed to load items. Is server running?</td></tr>';
  }
}

function renderTable(items = inventory) {
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";

  let safe = 0, expiring = 0, critical = 0, expired = 0;

  if (items.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:30px;">No items found</td></tr>';
    updateCounts(safe, expiring, critical, expired);
    return;
  }

  items.forEach(item => {
    const daysLeft = getDaysUntilExpiry(item.expiry_date);
    const expiryStatus = getExpiryStatus(daysLeft);
    const stockStatus = getStockStatus(item.stock);

    if (expiryStatus.class === "safe") safe++;
    else if (expiryStatus.class === "expiring") expiring++;
    else if (expiryStatus.class === "critical") critical++;
    else if (expiryStatus.class === "expired") expired++;

    const row = document.createElement("tr");
    row.innerHTML = `
      <td><strong>${item.name}</strong></td>
      <td class="stock"><strong>${item.stock}</strong> <small style="color:${stockStatus.color}">(${stockStatus.text})</small></td>
      <td>${item.expiry_date}</td>
      <td class="${daysLeft < 0 ? 'expired-text' : ''}">${daysLeft < 0 ? 'Expired' : daysLeft + ' days'}</td>
      <td class="status">
        <span class="badge ${expiryStatus.class}">${expiryStatus.text}</span>
      </td>
      <td>
        <button class="btn-icon add" onclick="changeStock(${item.id}, 1)">+</button>
        <button class="btn-icon minus" onclick="changeStock(${item.id}, -1)">-</button>
        <button class="btn-icon delete" onclick="deleteItem(${item.id})">Delete</button>
      </td>
    `;
    tbody.appendChild(row);
  });

  updateCounts(safe, expiring, critical, expired);
}

function updateCounts(safe, expiring, critical, expired) {
  document.getElementById("safeCount").textContent = safe;
  document.getElementById("expiringCount").textContent = expiring;
  document.getElementById("criticalCount").textContent = critical;
  document.getElementById("expiredCount").textContent = expired;
}

async function changeStock(id, value) {
  try {
    const response = await fetch(`${API_URL}/${id}/stock`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ change: value })
    });
    if (!response.ok) throw new Error('Failed to update stock');
    await loadItems();
  } catch (error) {
    alert('Failed to update stock');
  }
}

async function addItem(event) {
  event.preventDefault();
  const name = document.getElementById("itemName").value;
  const stock = parseInt(document.getElementById("itemStock").value);
  const expiryDate = document.getElementById("itemExpiry").value;

  try {
    const response = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, stock, expiry_date: expiryDate })
    });
    if (!response.ok) throw new Error('Failed to add item');
    document.getElementById("addItemForm").reset();
    await loadItems();
  } catch (error) {
    alert('Failed to add item');
  }
}

async function deleteItem(id) {
  if (!confirm("Are you sure you want to delete this item?")) return;
  try {
    const response = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
    if (!response.ok) throw new Error('Failed to delete item');
    await loadItems();
  } catch (error) {
    alert('Failed to delete item');
  }
}

function searchItems() {
  const query = document.getElementById("searchInput").value.toLowerCase();
  const filtered = inventory.filter(item => item.name.toLowerCase().includes(query));
  renderTable(filtered);
}

function filterItems() {
  const filter = document.getElementById("filterStatus").value;
  if (filter === "all") { renderTable(); return; }
  const filtered = inventory.filter(item => {
    const daysLeft = getDaysUntilExpiry(item.expiry_date);
    const status = getExpiryStatus(daysLeft).class;
    return status === filter;
  });
  renderTable(filtered);
}

loadItems();
</script>

</body>
</html>
